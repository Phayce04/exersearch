<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>ExerSearch – Data Flow Diagram</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

  :root{
    --orange-dark:#ab3200;
    --orange:#fc4a00;
    --orange-light:#ff5a16;
    --text:#222;
    --muted:#9a9a9a;
    --line:#444;
    --line-soft:#b9b9b9;
    --proc-bg:#f7f7f7;
    --store-bg:#fff8f2;
    --store-strip:#ffe2cf;
    --store-border:#f0a56f;
  }

  *{margin:0;padding:0;box-sizing:border-box}

  body{
    background:#fff;
    font-family:'Inter',sans-serif;
    padding:40px 46px;
    color:var(--text);
  }

  h2{
    font-size:15px;
    font-weight:700;
    margin-bottom:4px;
  }

  .sub{
    font-size:11px;
    color:var(--muted);
    margin-bottom:26px;
  }

  svg text{ font-family:'Inter',sans-serif; }

  .lbl{
    font-size:9.4px;
    fill:var(--line);
  }

  .lbl-soft{
    font-size:9px;
    fill:var(--line-soft);
  }
</style>
</head>
<body>


<svg width="1320" height="900" viewBox="0 0 1320 900">
  <defs>
    <marker id="ar" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3z" fill="#444"/>
    </marker>
    <marker id="ar-soft" markerWidth="8" markerHeight="8" refX="7" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3z" fill="#b9b9b9"/>
    </marker>
  </defs>

  <!-- =========================
       EXTERNAL ENTITIES
  ========================== -->

  <!-- User -->
  <rect x="38" y="248" width="130" height="54" rx="2" fill="var(--orange-dark)"/>
  <rect x="30" y="240" width="130" height="54" rx="2" fill="var(--orange)"/>
  <text x="95" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">User /</text>
  <text x="95" y="282" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Gym Goer</text>

  <!-- Gym Owner -->
  <rect x="38" y="588" width="130" height="54" rx="2" fill="var(--orange-dark)"/>
  <rect x="30" y="580" width="130" height="54" rx="2" fill="var(--orange)"/>
  <text x="95" y="606" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Gym Owner</text>
  <text x="95" y="624" text-anchor="middle" font-size="10" fill="#ffe5d4">Portal User</text>

  <!-- Admin -->
  <rect x="1128" y="78" width="130" height="54" rx="2" fill="var(--orange-dark)"/>
  <rect x="1120" y="70" width="130" height="54" rx="2" fill="var(--orange)"/>
  <text x="1185" y="102" text-anchor="middle" font-size="13" font-weight="700" fill="#fff">Admin</text>

  <!-- Google Maps API -->
  <rect x="1128" y="258" width="130" height="54" rx="2" fill="var(--orange-dark)"/>
  <rect x="1120" y="250" width="130" height="54" rx="2" fill="var(--orange)"/>
  <text x="1185" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Google Maps</text>
  <text x="1185" y="296" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">API</text>

  <!-- Email Service -->
  <rect x="1128" y="598" width="130" height="54" rx="2" fill="var(--orange-dark)"/>
  <rect x="1120" y="590" width="130" height="54" rx="2" fill="var(--orange)"/>
  <text x="1185" y="618" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Email</text>
  <text x="1185" y="636" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">Service</text>

  <!-- =========================
       PROCESSES
  ========================== -->

  <!-- P1 -->
  <rect x="250" y="70" width="200" height="60" rx="1" fill="var(--proc-bg)" stroke="#d8d8d8" stroke-width="1.4"/>
  <rect x="250" y="70" width="30" height="60" rx="1" fill="var(--orange)"/>
  <text x="355" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Auth &amp; User</text>
  <text x="355" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Registration</text>

  <!-- P2 -->
  <rect x="250" y="245" width="200" height="60" rx="1" fill="var(--proc-bg)" stroke="#d8d8d8" stroke-width="1.4"/>
  <rect x="250" y="245" width="30" height="60" rx="1" fill="var(--orange)"/>
  <text x="355" y="271" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">FIT-Rank Gym</text>
  <text x="355" y="293" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Recommendation</text>

  <!-- P3 -->

  <text x="355" y="471" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Workout &amp; Meal</text>
  <text x="355" y="493" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Planning</text>

  <!-- P4 -->
  <rect x="250" y="580" width="200" height="60" rx="1" fill="var(--proc-bg)" stroke="#d8d8d8" stroke-width="1.4"/>
  <rect x="250" y="580" width="30" height="60" rx="1" fill="var(--orange)"/>
  <text x="355" y="606" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Gym Owner</text>
  <text x="355" y="628" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Management</text>

  <!-- P6 -->
  <rect x="820" y="70" width="200" height="60" rx="1" fill="var(--proc-bg)" stroke="#d8d8d8" stroke-width="1.4"/>
  <rect x="820" y="70" width="30" height="60" rx="1" fill="var(--orange)"/>
  <text x="925" y="95" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Admin &amp; System</text>
  <text x="925" y="117" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Control</text>

  <!-- P5 -->
  <rect x="820" y="445" width="200" height="60" rx="1" fill="var(--proc-bg)" stroke="#d8d8d8" stroke-width="1.4"/>
  <rect x="820" y="445" width="30" height="60" rx="1" fill="var(--orange)"/>
  <text x="925" y="471" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">ML Weight</text>
  <text x="925" y="493" text-anchor="middle" font-size="11" font-weight="700" fill="var(--text)">Training</text>

  <!-- =========================
       DATA STORES
  ========================== -->

  <!-- User DB -->
  <rect x="560" y="80" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="575" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="590" y="80" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="695" y="108" text-anchor="middle" font-size="11" font-weight="700" fill="#333">User DB</text>

  <!-- Gym DB -->
  <rect x="560" y="252" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="575" y="280" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="590" y="252" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="695" y="280" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Gym DB</text>

  <!-- Interaction Logs -->
  <rect x="560" y="442" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="575" y="470" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="590" y="442" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="695" y="470" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Interaction Logs</text>

  <!-- ML Weights -->
  <rect x="560" y="590" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="575" y="618" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="590" y="590" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="695" y="618" text-anchor="middle" font-size="11" font-weight="700" fill="#333">ML Weights</text>

  <!-- Gym Owner DB -->
  <rect x="560" y="688" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="575" y="716" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="590" y="688" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="695" y="716" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Gym Owner DB</text>

  <!-- Plans DB -->
  <rect x="560" y="770" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="575" y="798" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="590" y="770" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="695" y="798" text-anchor="middle" font-size="11" font-weight="700" fill="#333">Plans DB</text>

  <!-- App Settings -->
  <rect x="820" y="182" width="30" height="46" fill="var(--store-strip)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="835" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="var(--orange-dark)">C</text>
  <rect x="850" y="182" width="210" height="46" fill="var(--store-bg)" stroke="var(--store-border)" stroke-width="1.2"/>
  <text x="955" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#333">App Settings</text>

  <!-- =========================
       FLOWS
  ========================== -->

  <!-- User -> P1 (adjusted with lower user position) -->
  <polyline points="95,240 95,100 250,100"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="145" y="88" class="lbl">Registration Data</text>

  <!-- P1 -> User DB -->
  <line x1="450" y1="100" x2="560" y2="100"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="510" y="88" class="lbl">User Record</text>

  <!-- P1 -> P6 -->
  <line x1="450" y1="116" x2="820" y2="116"
        stroke="var(--line-soft)" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#ar-soft)"/>
  <text x="634" y="134" class="lbl-soft">User Stats</text>

  <!-- P6 -> Admin -->
  <line x1="1020" y1="100" x2="1120" y2="100"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="1042" y="88" class="lbl">Reports, Logs</text>

  <!-- Admin -> P6 -->
  <line x1="1120" y1="118" x2="1020" y2="118"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="1045" y="138" class="lbl">Config, Content</text>

  <!-- P6 -> App Settings -->
  <line x1="955" y1="130" x2="955" y2="182"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="968" y="165" class="lbl">Backup / Config</text>

  <!-- P6 -> Email Service -->
  <polyline points="1020,118 1080,118 1080,618 1120,618"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="1085" y="395" class="lbl">Email Payload</text>

<!-- Email Service -> User -->
<polyline points="1120,632 1210,632 1210,835 185,835 185,260 160,260"
          fill="none"
          stroke="var(--line-soft)"
          stroke-width="1.1"
          stroke-dasharray="5,4"
          marker-end="url(#ar-soft)"/>

  <!-- User -> P2 -->
  <line x1="160" y1="255" x2="250" y2="255"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="170" y="238" class="lbl">Preference, Budget</text>

  <!-- P2 -> User -->
  <line x1="250" y1="285" x2="160" y2="285"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="170" y="308" class="lbl">Ranked Gym Results</text>

  <!-- P2 -> Gym DB -->
  <line x1="450" y1="272" x2="560" y2="272"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="520" y="258" class="lbl">Query / Read</text>

  <!-- Gym DB -> P2 -->
  <line x1="560" y1="292" x2="450" y2="292"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="520" y="310" class="lbl">Gym Data</text>

  <!-- P2 / Gym DB -> Google Maps -->
  <polyline points="800,275 855,275 855,277 1120,277"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="650" y="258" class="lbl">Origin, Destination</text>

  <!-- Google Maps -> P2 (kept straight longer, then down, then back to process) -->
  <polyline points="1120,298 930,298 930,305 450,305"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="935" y="330" class="lbl">Travel Time</text>

  <!-- User DB -> P2 -->
  <polyline points="640,126 640,232 355,232 355,245"
            fill="none" stroke="var(--line-soft)" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#ar-soft)"/>
  <text x="652" y="178" class="lbl-soft">User Preferences</text>

  <!-- ML Weights -> P2 -->
<polyline points="560,608 540,608 540,325 355,325 355,305"
          fill="none"
          stroke="var(--line)"
          stroke-width="1.4"
          marker-end="url(#ar)"/>
  <text x="505" y="596" class="lbl">TOPSIS Weights</text>

  <!-- User -> P3 (adjusted with lower user position) -->
  <polyline points="95,294 95,482 250,482"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="104" y="390" class="lbl">Plan Request</text>

  <!-- P3 -> User (adjusted with lower user position) -->
  <polyline points="250,505 180,505 180,270 160,270"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="106" y="488" class="lbl">Workout &amp; Meal Plan</text>

  <!-- P3 -> Interaction Logs -->
  <line x1="450" y1="470" x2="560" y2="470"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="520" y="458" class="lbl">Save Plans</text>

  <!-- P3 -> Plans DB -->
  <polyline points="450,495 518,495 518,793 560,793"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="458" y="520" class="lbl">Generated Plans</text>

  <!-- Plans DB -> P3 -->
  <polyline points="560,780 530,780 530,510 450,510"
            fill="none" stroke="var(--line-soft)" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#ar-soft)"/>
  <text x="458" y="542" class="lbl-soft">Read Templates</text>

  <!-- P2 -> Interaction Logs -->
  <polyline points="700,298 700,442"
            fill="none" stroke="var(--line-soft)" stroke-width="1.1" stroke-dasharray="5,4" marker-end="url(#ar-soft)"/>
  <text x="712" y="370" class="lbl-soft">Interaction Log</text>

  <!-- Interaction Logs -> P5 -->
  <line x1="800" y1="470" x2="820" y2="470"

  <polyline points="1020,475 1060,475 1060,625 800,625"
            fill="none" stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="905" y="608" class="lbl">Trained Weights</text>

  <!-- Gym Owner -> P4 -->
  <line x1="160" y1="607" x2="250" y2="607"
        stroke="var(--line)" stroke-width="1.4" marker-end="url(#ar)"/>
  <text x="165" y="594" class="lbl">Gym Info, Equipment</text>

  <!-- P4 -> Gym Owner -->
  <line x1="250" y1="627" x2="160" y2="627"

  <!-- Gym Owner DB -> P4 -->

  <text x="795" y="580" class="lbl-soft">Owner Application</text>

</svg>

</body>
</html>
